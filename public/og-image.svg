<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#000"/>
  <!-- Subtle emerald gradient -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <!-- Logo box -->
  <rect x="510" y="160" width="60" height="60" rx="14" fill="#fff"/>
  <text x="540" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="36" fill="#000">A</text>
  <!-- Brand name -->
  <text x="590" y="205" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="42" fill="#fff">Alturia</text>
  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="36" fill="#fff">Automatización e IA para empresas</text>
  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="22" fill="#999">Escala tu negocio en piloto automático</text>
  <!-- URL -->
  <text x="600" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="18" fill="#10b981">alturia.net</text>
</svg>
